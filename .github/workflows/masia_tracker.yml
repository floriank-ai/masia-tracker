name: CASA MUSA Masia Alert

on:
  schedule:
    # Täglich 08:00 Madrid-Zeit
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Erlaubt dem Workflow zu pushen

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Ejecutar CASA MUSA Alert
        env:
          EMAIL_ABSENDER:    ${{ secrets.EMAIL_ABSENDER }}
          EMAIL_PASSWORT:    ${{ secrets.EMAIL_PASSWORT }}
          EMAIL_EMPFAENGER:  ${{ secrets.EMAIL_EMPFAENGER }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: python masia_tracker.py

      - name: Commit gesehen-Datei
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add masia_gesehen.json || true
          git diff --staged --quiet || git commit -m "Update masia_gesehen.json [skip ci]"
          git push || echo "Nichts zu pushen"

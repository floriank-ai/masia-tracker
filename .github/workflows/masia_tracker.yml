name: CASA MUSA Masia Alert

on:
  schedule:
    # Täglich um 08:00 Uhr Madrid-Zeit (06:00 UTC im Winter, 07:00 UTC im Sommer)
    # Wir nehmen 07:00 UTC = 08:00 Winter / 09:00 Sommer
    - cron: '0 7 * * *'
  workflow_dispatch:  # Manuell startbar

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Gesehene Angebote laden (Cache)
        uses: actions/cache@v4
        with:
          path: masia_gesehen.json
          key: masia-gesehen-${{ github.run_id }}
          restore-keys: |
            masia-gesehen-

      - name: Ejecutar CASA MUSA Alert
        env:
          EMAIL_ABSENDER:    ${{ secrets.EMAIL_ABSENDER }}
          EMAIL_PASSWORT:    ${{ secrets.EMAIL_PASSWORT }}
          EMAIL_EMPFAENGER:  ${{ secrets.EMAIL_EMPFAENGER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python masia_tracker.py
